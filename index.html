<style>
.history-section {
  background: #cfcfcf;
  padding: 60px 40px;
  text-align: left;
}

.history-title {
  text-align: center;
  font-size: 34px;
  font-weight: 700;
  margin-bottom: 50px;
  color: #111;
}

.timeline {
  position: relative;
  max-width: 760px;
  margin: 0 auto;
  padding-left: 45px;
}

/* 세로줄 */
.timeline::before {
  content: "";
  position: absolute;
  left: 12px;
  top: 0;
  width: 3px;
  height: 100%;
  background: #5a4a56;
}

/* 항목 */
.timeline-item {
  position: relative;
  display: flex;
  gap: 35px;
  margin-bottom: 34px;
  align-items: flex-start;
}

/* 동그라미 */
.timeline-item::before {
  content: "";
  position: absolute;
  left: -39px;
  top: 8px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #5a4a56;
}

.timeline-date {
  min-width: 120px;
  font-size: 18px;
  font-weight: 700;
  color: #5a4a56;
}

.timeline-content {
  font-size: 18px;
  line-height: 1.6;
  color: #111;
  word-break: keep-all;
}

/* 모바일 */
@media (max-width: 768px) {
  .history-section {
    padding: 40px 20px;
  }

  .timeline-item {
    flex-direction: column;
    gap: 6px;
    margin-bottom: 28px;
  }

  .timeline-date {
    min-width: auto;
  }
}
</style>
